<!doctype html>
<html lang="zh-CN" data-language="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080d12" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/assets/app-icon.png" />
    <link rel="stylesheet" href="/animated-robin.css" />
    <link rel="stylesheet" href="/styles.css" />
    <title>404 — CoreRobin</title>
  </head>
  <body class="not-found-page">
    <main class="not-found section-shell" id="main-content">
      <div class="language-picker not-found__language">
        <span class="language-picker__icon" aria-hidden="true">文</span>
        <select data-language-select aria-label="选择语言" title="选择语言">
          <option value="/" selected>简体中文</option><option value="/en/">English</option><option value="/zh-hant/">繁體中文</option><option value="/ja/">日本語</option><option value="/de/">Deutsch</option><option value="/fr/">Français</option><option value="/es/">Español</option><option value="/pt-br/">Português (Brasil)</option><option value="/ko/">한국어</option><option value="/ru/">Русский</option>
        </select>
      </div>
      <div class="not-found__robin" data-robin data-robin-mood="normal" aria-hidden="true"></div>
      <span>404</span>
      <h1>这里没有你要找的页面。</h1>
      <p>链接可能已经变更。你可以回到首页或直接选择安装包。</p>
      <div class="not-found__actions"><a class="button button--primary" href="/">回到首页</a><a class="button button--ghost" href="/download/">前往下载</a></div>
    </main>
    <script src="/site.js" defer></script>
  </body>
</html>
