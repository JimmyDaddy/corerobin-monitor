name: Check public site

on:
  push:
    branches:
      - main
    paths:
      - "README*"
      - "PRIVACY*"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "docs/**"
      - "site/**"
      - "scripts/**"
      - "tests/site/**"
      - "playwright.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/site-check.yml"
  pull_request:
    paths:
      - "docs/**"
      - "site/**"
      - "scripts/**"
      - "tests/site/**"
      - "playwright.config.mjs"
      - "README*"
      - "PRIVACY*"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/site-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install site check dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify static site
        run: node scripts/build-site.mjs

      - name: Check external links
        run: node scripts/check-external-links.mjs

      - name: Install Chromium for browser checks
        run: pnpm exec playwright install --with-deps chromium

      - name: Run responsive and accessibility checks
        run: pnpm site:test

      - name: Upload browser check artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-site-browser-checks
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14
